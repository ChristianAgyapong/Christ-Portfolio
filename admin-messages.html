<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Contact Messages | Christian Agyapong</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Vercel Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
        body {
            background: #0a0e27;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            padding: 2rem;
        }
        
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .admin-header {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid #00ff88;
        }
        
        .admin-header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }
        
        .admin-header .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
        }
        
        .stat-item {
            background: rgba(0, 255, 136, 0.1);
            padding: 1rem 2rem;
            border-radius: 8px;
            border: 1px solid #00ff88;
        }
        
        .stat-item span {
            font-size: 2rem;
            font-weight: bold;
        }
        
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 0.8rem 1.5rem;
            background: transparent;
            border: 2px solid #00ff88;
            color: #00ff88;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            transition: all 0.3s ease;
            border-radius: 4px;
        }
        
        .btn:hover {
            background: #00ff88;
            color: #0a0e27;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }
        
        .btn-danger {
            border-color: #ff4444;
            color: #ff4444;
        }
        
        .btn-danger:hover {
            background: #ff4444;
            color: #fff;
        }
        
        .filter-tabs {
            display: flex;
            gap: 1rem;
        }
        
        .filter-tabs button {
            padding: 0.5rem 1rem;
        }
        
        .filter-tabs button.active {
            background: #00ff88;
            color: #0a0e27;
        }
        
        .messages-container {
            display: grid;
            gap: 1.5rem;
        }
        
        .message-card {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid #00ff88;
            border-radius: 8px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }
        
        .message-card:hover {
            background: rgba(0, 255, 136, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            transform: translateX(5px);
        }
        
        .message-card.unread {
            border-color: #ffd700;
            border-width: 2px;
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .message-info h3 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: #00ff88;
        }
        
        .message-info p {
            margin: 0.3rem 0;
            color: #88ffcc;
            font-size: 0.9rem;
        }
        
        .message-meta {
            text-align: right;
        }
        
        .message-meta .date {
            font-size: 0.85rem;
            color: #88ffcc;
            margin-bottom: 0.5rem;
        }
        
        .message-meta .status-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .status-badge.unread {
            background: #ffd700;
            color: #0a0e27;
        }
        
        .status-badge.read {
            background: #555;
            color: #aaa;
        }
        
        .message-body {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 4px;
            margin: 1rem 0;
            line-height: 1.6;
        }
        
        .message-body strong {
            color: #00ff88;
        }
        
        .message-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .message-actions button {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #88ffcc;
        }
        
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            
            .admin-header h1 {
                font-size: 1.8rem;
            }
            
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .filter-tabs {
                flex-wrap: wrap;
            }
            
            .message-header {
                flex-direction: column;
            }
            
            .message-meta {
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-shield-alt"></i> Admin Panel - Contact Messages</h1>
            <div class="stats">
                <div class="stat-item">
                    <div>Total Messages</div>
                    <span id="total-count">0</span>
                </div>
                <div class="stat-item">
                    <div>Unread</div>
                    <span id="unread-count">0</span>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <div class="filter-tabs">
                <button class="btn active" data-filter="all">All Messages</button>
                <button class="btn" data-filter="unread">Unread Only</button>
                <button class="btn" data-filter="read">Read Only</button>
            </div>
            
            <div>
                <button class="btn" onclick="markAllRead()">
                    <i class="fas fa-check-double"></i> Mark All Read
                </button>
                <button class="btn btn-danger" onclick="clearAllMessages()">
                    <i class="fas fa-trash"></i> Clear All
                </button>
            </div>
        </div>
        
        <div id="messages-container" class="messages-container">
            <!-- Messages will be loaded here -->
        </div>
    </div>

    <script>
        let currentFilter = 'all';
        let messages = [];

        // Load messages on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadMessages();
            setupFilterTabs();
        });

        function loadMessages() {
            // Get messages from localStorage
            messages = JSON.parse(localStorage.getItem('contactMessages') || '[]');
            
            // Update stats
            updateStats();
            
            // Display messages
            displayMessages();
        }

        function updateStats() {
            const totalCount = messages.length;
            const unreadCount = messages.filter(m => !m.read).length;
            
            document.getElementById('total-count').textContent = totalCount;
            document.getElementById('unread-count').textContent = unreadCount;
        }

        function displayMessages() {
            const container = document.getElementById('messages-container');
            
            // Filter messages based on current filter
            let filteredMessages = messages;
            if (currentFilter === 'unread') {
                filteredMessages = messages.filter(m => !m.read);
            } else if (currentFilter === 'read') {
                filteredMessages = messages.filter(m => m.read);
            }
            
            // Show empty state if no messages
            if (filteredMessages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h2>No messages found</h2>
                        <p>${currentFilter === 'all' ? 'No contact messages yet.' : `No ${currentFilter} messages.`}</p>
                    </div>
                `;
                return;
            }
            
            // Build HTML for messages
            const html = filteredMessages.map(msg => {
                const date = new Date(msg.timestamp);
                const formattedDate = date.toLocaleString();
                const readClass = msg.read ? 'read' : 'unread';
                const statusText = msg.read ? 'Read' : 'New';
                
                return `
                    <div class="message-card ${readClass}">
                        <div class="message-header">
                            <div class="message-info">
                                <h3>${escapeHtml(msg.name)}</h3>
                                <p><i class="fas fa-envelope"></i> ${escapeHtml(msg.email)}</p>
                                <p><i class="fas fa-tag"></i> ${escapeHtml(msg.subject)}</p>
                            </div>
                            <div class="message-meta">
                                <div class="date"><i class="fas fa-clock"></i> ${formattedDate}</div>
                                <span class="status-badge ${readClass}">${statusText}</span>
                            </div>
                        </div>
                        
                        <div class="message-body">
                            <strong>Message:</strong><br>
                            ${escapeHtml(msg.message).replace(/\n/g, '<br>')}
                        </div>
                        
                        <div class="message-actions">
                            ${!msg.read ? `<button class="btn" onclick="markAsRead(${msg.id})">
                                <i class="fas fa-check"></i> Mark as Read
                            </button>` : ''}
                            <button class="btn" onclick="replyTo('${escapeHtml(msg.email)}', '${escapeHtml(msg.subject)}')">
                                <i class="fas fa-reply"></i> Reply
                            </button>
                            <button class="btn btn-danger" onclick="deleteMessage(${msg.id})">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            
            container.innerHTML = html;
        }

        function setupFilterTabs() {
            const tabs = document.querySelectorAll('.filter-tabs .btn');
            tabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    // Remove active class from all tabs
                    tabs.forEach(t => t.classList.remove('active'));
                    // Add active class to clicked tab
                    this.classList.add('active');
                    
                    // Set filter and reload
                    currentFilter = this.dataset.filter;
                    displayMessages();
                });
            });
        }

        function markAsRead(id) {
            messages = messages.map(msg => {
                if (msg.id === id) {
                    msg.read = true;
                }
                return msg;
            });
            
            // Save to localStorage
            localStorage.setItem('contactMessages', JSON.stringify(messages));
            
            // Reload display
            loadMessages();
        }

        function markAllRead() {
            if (confirm('Mark all messages as read?')) {
                messages = messages.map(msg => {
                    msg.read = true;
                    return msg;
                });
                
                localStorage.setItem('contactMessages', JSON.stringify(messages));
                loadMessages();
            }
        }

        function deleteMessage(id) {
            if (confirm('Are you sure you want to delete this message?')) {
                messages = messages.filter(msg => msg.id !== id);
                
                // Save to localStorage
                localStorage.setItem('contactMessages', JSON.stringify(messages));
                
                // Reload display
                loadMessages();
            }
        }

        function clearAllMessages() {
            if (confirm('Are you sure you want to delete ALL messages? This cannot be undone!')) {
                localStorage.removeItem('contactMessages');
                messages = [];
                loadMessages();
            }
        }

        function replyTo(email, subject) {
            const mailtoLink = `mailto:${email}?subject=Re: ${subject}`;
            window.location.href = mailtoLink;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
